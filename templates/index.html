<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prawn Count Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #1a202c;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.75rem;
    }

    .icon {
      width: 40px;
      height: 40px;
      background: #e6f4ea;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a202c;
    }

    .header p {
      font-size: 13px;
      color: #718096;
      margin-top: 2px;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #4a5568;
      margin-bottom: 6px;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      color: #1a202c;
      background: #f7fafc;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: #2f855a;
      background: #fff;
    }

    .unit {
      font-size: 12px;
      color: #a0aec0;
      margin-top: 4px;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #276749;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s;
    }

    button:hover { background: #22543d; }
    button:active { background: #1c4532; }

    .result {
      display: none;
      margin-top: 1.5rem;
      background: #f0fff4;
      border: 1.5px solid #9ae6b4;
      border-radius: 10px;
      padding: 1.25rem;
    }

    .result.visible { display: block; }

    .result-label {
      font-size: 12px;
      font-weight: 500;
      color: #276749;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .result-count {
      font-size: 36px;
      font-weight: 700;
      color: #22543d;
      line-height: 1;
    }

    .result-sub {
      font-size: 13px;
      color: #4a5568;
      margin-top: 10px;
      line-height: 1.5;
    }

    .result-sub span {
      font-weight: 500;
      color: #276749;
    }

    .error {
      display: none;
      margin-top: 1.25rem;
      background: #fff5f5;
      border: 1.5px solid #fc8181;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 13px;
      color: #c53030;
    }

    .error.visible { display: block; }

    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">🦐</div>
      <div>
        <h1>Prawn Survival Calculator</h1>
        <p>Black Tiger — feeding chart based</p>
      </div>
    </div>

    <div class="field">
      <label for="grams">APW - Average Prawn Weight</label>
      <input type="number" id="grams" placeholder="e.g. 20" min="0.1" step="0.1" />
      <div class="unit">grams</div>
    </div>

    <div class="field">
      <label for="feed">Feed per day</label>
      <input type="number" id="feed" placeholder="e.g. 5.5" min="0.01" step="0.01" />
      <div class="unit">kg</div>
    </div>

    <button onclick="calculate()">Calculate survival</button>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-label">Estimated survival</div>
      <div class="result-count" id="count-display">—</div>
      <hr class="divider" />
      <div class="result-label">Biomass</div>
      <div class="result-count" id="biomass-display">—</div>
      <hr class="divider" />
      <div class="result-sub" id="result-details"></div>
    </div>

  <script>
    async function calculate() {
      const grams = document.getElementById('grams').value.trim();
      const feed  = document.getElementById('feed').value.trim();
      const errorEl  = document.getElementById('error');
      const resultEl = document.getElementById('result');

      errorEl.classList.remove('visible');
      resultEl.classList.remove('visible');

      if (!grams || !feed) {
        errorEl.textContent = 'Please enter both values.';
        errorEl.classList.add('visible');
        return;
      }

      try {
        const res = await fetch('/calculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ grams: parseFloat(grams), feed: parseFloat(feed) })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Something went wrong.';
          errorEl.classList.add('visible');
          return;
        }

        const low  = data.prawn_count_low.toLocaleString();
        const high = data.prawn_count_high.toLocaleString();
        const countDisplay = document.getElementById('count-display');
        const detailsEl    = document.getElementById('result-details');

        if (data.prawn_count_low === data.prawn_count_high) {
          countDisplay.textContent = low;
        } else {
          countDisplay.textContent = `${low} – ${high}`;
        }

        detailsEl.innerHTML =
          `Matched body weight: <span>${data.body_weight}g</span><br>` +
          `Feed ratio used: <span>${data.feed_pct_low}% – ${data.feed_pct_high}%</span>`;
	const biomassLow  = data.biomass_low.toLocaleString();
        const biomassHigh = data.biomass_high.toLocaleString();
        const biomassDisplay = document.getElementById('biomass-display');

        if (biomassLow === biomassHigh) {
          biomassDisplay.textContent = biomassLow + ' kg';
        } else {
          biomassDisplay.textContent = `${biomassLow} – ${biomassHigh} kg`;
        }
        resultEl.classList.add('visible');

      } catch (err) {
        errorEl.textContent = 'Could not connect. Is the server running?';
        errorEl.classList.add('visible');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });
  </script>
</body>
</html>
